<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Unoptimized Website</title>

    <!-- Loading huge CSS inline -->
    <style>
        /* This huge CSS should be moved to an external file for optimization */
        body { margin: 0; font-family: Arial, sans-serif; }
        h1 { text-align: center; color: red; margin-top: 20px; }
        img { width: 100%; }
        .content { padding: 20px; text-align: justify; }
        /* Unnecessary duplicated styles */
        p { line-height: 1.6; }
        p { margin-bottom: 1.5rem; }
        p { font-size: 16px; }
        /* Excessive use of custom fonts */
        @font-face {
            font-family: 'CustomFont';
            src: url('https://example.com/slow-loading-font.ttf');
        }
    </style>
</head>
<body>
    <h1>Welcome to a Slow Website</h1>

    <!-- Unoptimized large image -->
    <img src="https://via.placeholder.com/3000x2000" alt="Large Placeholder Image">

    <!-- Blocking script -->
    <script>
        // Simulate blocking JavaScript
        for (let i = 0; i < 1000000000; i++) {
            // Intentional loop to slow down page load
        }
    </script>

    <div class="content">
        <p>
            This is an unoptimized website designed for testing. It includes
            large inline CSS, unoptimized images, and blocking JavaScript to
            ensure that the page loads slowly.
        </p>
        <p>
            Your task is to fix these issues and make the website as fast as
            possible!
        </p>
    </div>

    <!-- Unnecessary large script loaded in the head -->
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>

    <!-- Inline JavaScript -->
    <script>
        document.querySelector('h1').style.color = 'blue';
    </script>
</body>
</html>
