<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fast Website Example</title>
    <style>
        /* Minimal CSS */
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 20px;
            max-width: 800px;
            line-height: 1.6;
        }
        h1 {
            color: #333;
        }
    </style>
</head>
<body>
    <h1>Welcome to a Fast Website</h1>
    <p>This is an example of a lightweight, static webpage designed for speed and efficiency.</p>
    <p>By minimizing CSS and JavaScript, and serving static content, we ensure quick load times and a better user experience.</p>
</body>
</html>
