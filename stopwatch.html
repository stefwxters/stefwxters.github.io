<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Stopwatch/Timer</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      text-align: center;
      background-color: #f4f4f9;
      padding: 50px;
    }
    .container {
      max-width: 300px;
      margin: auto;
      padding: 20px;
      border-radius: 10px;
      background: #ffffff;
      box-shadow: 0 4px 8px rgba(0, 0, 0, 0.2);
    }
    h1 {
      margin-bottom: 20px;
    }
    .time-display {
      font-size: 2em;
      margin: 20px 0;
    }
    button {
      margin: 5px;
      padding: 10px 20px;
      font-size: 1em;
      cursor: pointer;
      border: none;
      border-radius: 5px;
      background: #007bff;
      color: white;
      transition: background 0.3s ease;
    }
    button:hover {
      background: #0056b3;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>Stopwatch / Timer</h1>
    <div class="time-display" id="timeDisplay">00:00:00</div>
    <button id="startStopBtn">Start</button>
    <button id="resetBtn">Reset</button>
    <br>
    <label for="timerInput">Set Timer (seconds):</label>
    <input type="number" id="timerInput" placeholder="Enter seconds">
    <button id="startTimerBtn">Start Timer</button>
  </div>

  <script>
    let stopwatchInterval;
    let timerInterval;
    let isRunning = false;
    let elapsedTime = 0;

    const timeDisplay = document.getElementById("timeDisplay");
    const startStopBtn = document.getElementById("startStopBtn");
    const resetBtn = document.getElementById("resetBtn");
    const timerInput = document.getElementById("timerInput");
    const startTimerBtn = document.getElementById("startTimerBtn");

    // Format time as HH:MM:SS
    function formatTime(seconds) {
      const hrs = Math.floor(seconds / 3600).toString().padStart(2, "0");
      const mins = Math.floor((seconds % 3600) / 60).toString().padStart(2, "0");
      const secs = (seconds % 60).toString().padStart(2, "0");
      return `${hrs}:${mins}:${secs}`;
    }

    // Stopwatch Start/Stop
    startStopBtn.addEventListener("click", () => {
      if (isRunning) {
        clearInterval(stopwatchInterval);
        startStopBtn.textContent = "Start";
      } else {
        stopwatchInterval = setInterval(() => {
          elapsedTime++;
          timeDisplay.textContent = formatTime(elapsedTime);
        }, 1000);
        startStopBtn.textContent = "Stop";
      }
      isRunning = !isRunning;
    });

    // Stopwatch Reset
    resetBtn.addEventListener("click", () => {
      clearInterval(stopwatchInterval);
      elapsedTime = 0;
      timeDisplay.textContent = "00:00:00";
      startStopBtn.textContent = "Start";
      isRunning = false;
    });

    // Timer
    startTimerBtn.addEventListener("click", () => {
      const timerSeconds = parseInt(timerInput.value, 10);
      if (isNaN(timerSeconds) || timerSeconds <= 0) {
        alert("Please enter a valid number of seconds!");
        return;
      }

      clearInterval(timerInterval);
      elapsedTime = timerSeconds;
      timeDisplay.textContent = formatTime(elapsedTime);

      timerInterval = setInterval(() => {
        if (elapsedTime > 0) {
          elapsedTime--;
          timeDisplay.textContent = formatTime(elapsedTime);
        } else {
          clearInterval(timerInterval);
          alert("Time's up!");
        }
      }, 1000);
    });
  </script>
</body>
</html>
